{% extends 'base.html' %}

{% block content %}

<style>
.login-container {
    max-width: 420px;
    margin: 80px auto;
    padding: 35px;
    border-radius: 12px;
    background: #ffffff;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    transition: 0.3s;
}

.dark-mode .login-container {
    background: #1e1e1e;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}

.login-container h2 {
    text-align: center;
    margin-bottom: 25px;
    color: var(--cor-principal);
    letter-spacing: 1px;
}

.form-group {
    margin-bottom: 18px;
}

.form-group label {
    display: block;
    margin-bottom: 6px;
    font-weight: bold;
}

.form-group input {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
    transition: 0.3s;
}

.dark-mode .form-group input {
    background: #2a2a2a;
    border: 1px solid #444;
    color: #fff;
}

.form-group input:focus {
    outline: none;
    border-color: var(--cor-principal);
    box-shadow: 0 0 0 2px rgba(255,106,0,0.2);
}

.errorlist {
    color: #ff4d4d;
    list-style: none;
    padding: 0;
    font-size: 14px;
    margin-top: 5px;
}

.btn-login {
    margin-top: 20px;
    width: 100%;
    padding: 12px;
    background: transparent;
    border: 2px solid var(--cor-principal);
    color: var(--cor-principal);
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    border-radius: 6px;
    transition: 0.3s;
}

.btn-login:hover {
    background: var(--cor-principal);
    color: #fff;
}
</style>

<div class="login-container">
    <h2>Login</h2>

    <form method="post">
    {% csrf_token %}

    {% for field in login_form %}
        <div class="form-group">
            <label for="{{ field.id_for_label }}">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
                <ul class="errorlist">
                    {% for error in field.errors %}
                        <li>{{ error }}</li>
                    {% endfor %}
                </ul>
            {% endif %}
        </div>
    {% endfor %}

    <button type="submit" class="btn-login">Entrar</button>
</form>
</div>

{% endblock %}
