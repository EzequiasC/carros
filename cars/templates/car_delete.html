{% extends "base.html" %}

{% block content %}

<style>
.delete-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 70vh;
}

.delete-card {
    background: #111;
    width: 100%;
    max-width: 500px;
    border-radius: 14px;
    padding: 30px;
    box-shadow: 0 0 20px rgba(255, 0, 0, 0.15);
    text-align: center;
}

.delete-card h1 {
    color: #fff;
    margin-bottom: 15px;
}

.delete-card p {
    color: #ccc;
    font-size: 16px;
    margin-bottom: 25px;
}

.delete-card strong {
    color: #ff6600;
}

.buttons-container {
    display: flex;
    justify-content: center;
    gap: 15px;
}

.btn {
    padding: 10px 20px;
    font-size: 15px;
    font-weight: bold;
    border-radius: 8px;
    cursor: pointer;
    border: none;
    transition: 0.2s ease;
}

.btn-danger {
    background-color: #d9534f;
    color: #fff;
}

.btn-danger:hover {
    background-color: #b52b27;
}

.btn-secondary {
    background-color: #444;
    color: #fff;
    text-decoration: none;
}

.btn-secondary:hover {
    background-color: #666;
}
</style>

<div class="delete-wrapper">
    <div class="delete-card">
        <h1>Deletar Carro</h1>

        <p>
            Tem certeza que deseja deletar o carro  
            <strong>{{ object.brand.name }} {{ object.model }}</strong>?
        </p>

        <form method="post">
            {% csrf_token %}
            <div class="buttons-container">
                <button type="submit" class="btn btn-danger">
                    Confirmar Exclusão
                </button>

                <a href="{% url 'car_update' pk=object.pk %}" class="btn btn-secondary">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
